## Append the placeholder '${dm_smbios_extra}' to every generated kernel command
## line, so a boot-tester can inject extra kernel cmdline through the real
## firmware -> GRUB -> kernel chain via 'qemu -smbios'
## ('dm-qemu --smbios-append') with no image edit. The reader that fills this
## variable is emitted by /etc/grub.d/01_smbios-reader; with no SMBIOS string set
## it stays empty and this is a no-op.
##
## This is sourced by grub-mkconfig, so it survives every 'update-grub' (e.g. on a
## kernel update), unlike a direct edit of the generated /boot/grub/grub.cfg. The
## '\$' keeps '${dm_smbios_extra}' literal in the generated grub.cfg: grub-mkconfig
## expands ${GRUB_CMDLINE_LINUX} only once (it does not recurse), so GRUB itself
## expands the placeholder at boot.
GRUB_CMDLINE_LINUX="$GRUB_CMDLINE_LINUX \${dm_smbios_extra}"
