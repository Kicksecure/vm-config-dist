## SPICE is a QEMU/KVM technology; VirtualBox does not implement it. Under
## VirtualBox this socket still listens and activates spice-vdagentd, which
## then has no SPICE host to talk to (confirmed running on an oracle guest).
## Skip the activation socket under VirtualBox so the daemon is never started.

[Unit]
ConditionVirtualization=!oracle
